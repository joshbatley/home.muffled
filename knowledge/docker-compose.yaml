services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    command:
      [
        "sh",
        "-lc",
        "openclaw gateway run --bind lan --port 18789"
      ]
    ports:
      - "18789:18789"
    volumes:
      # Repo-local OpenClaw runtime state (keep out of git).
      - ./.openclaw:/home/node/.openclaw
      # Host document store root mapped into OpenClaw workspace.
      # Override OPENCLAW_DOCSTORE_HOST_PATH to point at your projects root.
      # Default uses ./projects under the knowledge folder.
      - ${OPENCLAW_DOCSTORE_HOST_PATH:-./projects}:/home/node/.openclaw/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OPENCLAW_LOCAL_ENDPOINT=${OPENCLAW_LOCAL_ENDPOINT:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-ollama/glm-4.7-flash:latest}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}

  # Placeholder for your custom app (Uncomment when you are ready to build it)

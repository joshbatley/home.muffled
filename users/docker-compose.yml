services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authservice
      POSTGRES_PASSWORD: authservice
      POSTGRES_DB: authservice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://authservice:authservice@postgres:5432/authservice?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      SEED_USERNAME: ${SEED_USERNAME:-admin}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
